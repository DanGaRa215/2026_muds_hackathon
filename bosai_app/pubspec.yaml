name: bosai_app
description: 総合防災アプリ MVP（Flutter版・動く骨格）
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # ローカルDB（避難所・診断履歴・自宅情報）
  sqflite: ^2.3.2
  path: ^1.9.0
  # 家具診断の写真選択
  image_picker: ^1.1.0
  http: ^1.2.2
  http_parser: ^4.0.2
  geocoding: ^5.0.0
  http: ^1.2.2
  # オフライン地図表示（スパイク検証）
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  vector_map_tiles: ^8.0.0
  vector_map_tiles_pmtiles: ^1.5.0
  vector_tile_renderer: ^5.2.0
  path_provider: ^2.1.6
  geolocator: ^14.0.3

  # EEWリアルタイム連携用追加パッケージ
  web_socket_channel: ^3.0.1
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tokyo23_buffered.pmtiles
    - assets/routing.db